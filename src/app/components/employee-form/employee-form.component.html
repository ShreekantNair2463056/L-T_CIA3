<mat-card>
  <mat-card-title>{{ editingEmployeeId ? 'Edit Employee' : 'Add Employee' }}</mat-card-title>

  <form [formGroup]="employeeForm" (ngSubmit)="submit()" class="card-grid" style="margin-top: 16px;">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="employeeForm.controls.name.touched && employeeForm.controls.name.invalid">Name must be at least 3 characters.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
      <mat-error *ngIf="employeeForm.controls.email.touched && employeeForm.controls.email.invalid">Enter a valid email address.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Role</mat-label>
      <input matInput formControlName="role" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Department</mat-label>
      <input matInput formControlName="department" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Salary</mat-label>
      <input matInput type="number" formControlName="salary" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Joining Date</mat-label>
      <input matInput type="date" formControlName="joiningDate" />
    </mat-form-field>

    <p *ngIf="submitError" style="color: #b91c1c;">{{ submitError }}</p>

    <button mat-raised-button color="primary" type="submit">Save Employee</button>
  </form>
</mat-card>
