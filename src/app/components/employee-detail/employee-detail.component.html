<mat-card *ngIf="employee; else errorTpl">
  <mat-card-title>{{ employee.name }}</mat-card-title>
  <mat-card-content>
    <p><strong>Email:</strong> {{ employee.email }}</p>
    <p><strong>Role:</strong> {{ employee.role }}</p>
    <p><strong>Department:</strong> {{ employee.department }}</p>
    <p><strong>Salary:</strong> {{ employee.salary | currency: 'INR' }}</p>
    <p><strong>Joining Date:</strong> {{ employee.joiningDate | date }}</p>
  </mat-card-content>
  <mat-card-actions>
    <a mat-button color="primary" [routerLink]="['/employees', employee.id, 'edit']">Edit</a>
    <a mat-button [routerLink]="['/employees']">Back</a>
  </mat-card-actions>
</mat-card>

<ng-template #errorTpl>
  <mat-card>
    <mat-card-title>Error</mat-card-title>
    <mat-card-content>{{ errorMessage }}</mat-card-content>
  </mat-card>
</ng-template>
